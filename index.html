<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ВК Гости</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="ambient ambient-left"></div>
      <div class="ambient ambient-right"></div>
      <main class="app" id="app">
        <section class="hero card">
          <div class="hero-copy">
            <h1>ВК Гости</h1>
          </div>
          <div class="hero-status hidden" id="heroStatus"></div>
        </section>

        <section class="notice card hidden" id="noticeCard"></section>

        <section class="tabs card hidden" id="tabsCard">
          <div class="tabs-header">
            <div class="tabs-title" id="tabsTitle">
              <h2>Ваши гости</h2>
            </div>
            <p class="tab-caption" id="tabCaption"></p>
          </div>
          <div class="tabs-nav" id="tabsNav"></div>
          <div class="tab-content" id="tabContent"></div>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
